# Limit parallel compilation to cap peak memory at ~8Gi.
# jobs=4, codegen-units=2: 4 parallel × ~1.5Gi = ~6Gi peak.
[build]
jobs = 4

# Fewer codegen units = less memory; 2 is a good speed/memory balance.
# "line-tables-only" preserves line info for panics without full variable data.
[profile.dev]
codegen-units = 2
debug = "line-tables-only"

[profile.test]
codegen-units = 2
debug = "line-tables-only"
