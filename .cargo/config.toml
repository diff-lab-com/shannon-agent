# Limit parallel compilation to cap peak memory at ~4Gi.
# Default: 20 parallel rustc × ~2Gi each = 40-80Gi peak.
# jobs=2, codegen-units=1: 2 parallel × ~1.5Gi = ~3Gi peak.
[build]
jobs = 2

# Minimum codegen units + lighter debug info = less memory per crate.
# "line-tables-only" preserves line info for panics without full variable data.
[profile.dev]
codegen-units = 1
debug = "line-tables-only"

[profile.test]
codegen-units = 1
debug = "line-tables-only"
