name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Rust build / clippy / fmt were removed from CI because the Gitea runner
  # cannot reliably reach github.com (cloning actions/checkout and the
  # shannon-code sibling both time out). Run them locally before merge:
  #   cargo fmt --all -- --check
  #   cargo clippy --workspace -- -D warnings
  #   cargo test --workspace
  audit:
    name: cargo-deny
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Check out shannon-code sibling (pinned to 00510a7)
        uses: actions/checkout@v4
        with:
          repository: shannon-agent/shannon-code
          path: ../shannon-code
          ref: 00510a7
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: Check dependencies
        run: cargo deny check --hide-inclusion-graph

  ui:
    name: UI · lint + test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: "10"
      - name: Install UI deps
        run: pnpm install --dir ui --frozen-lockfile
      - name: Type check
        run: pnpm --dir ui lint
      - name: Unit tests
        run: pnpm --dir ui test --run
