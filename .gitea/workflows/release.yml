name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Full 40-char SHA is required: git fetch by short SHA fails with
  # "couldn't find remote ref <short>" because the refspec parser treats
  # abbreviated SHAs as ref names. GitHub's upload-pack resolves full SHAs
  # via allowReachableSHA1InWant.
  SHANNON_CODE_REV: "26343ba15737ac9b4da5c59aa6ceb139a443564d"
  # linuxdeploy + plugins are themselves AppImages. In rootless DinD the
  # runner has no /dev/fuse, so the AppImage runtime cannot self-mount.
  # APPIMAGE_EXTRACT_AND_RUN=1 tells them to extract to a temp dir and
  # run from there — pure userspace, no capabilities or device access
  # required. Costs ~5s per build.
  APPIMAGE_EXTRACT_AND_RUN: "1"
  # Tauri updater signing — secrets come from Gitea repo settings.
  # When both are present, `cargo tauri build` emits .sig files next to
  # every installer plus a latest.json manifest. The pubkey lives in
  # tauri.conf.json; the private key never enters the repo.
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  audit:
    name: Supply chain audit
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout desktop
        uses: https://gitea.com/actions/checkout@v4

      - name: Route github.com through gh-proxy
        shell: bash
        run: git config --global url."https://gh-proxy.com/https://github.com/".insteadOf "https://github.com/"

      - name: Clone shannon-code sibling at pinned rev
        shell: bash
        env:
          SHANNON_CODE_REV: ${{ env.SHANNON_CODE_REV }}
        run: |
          git clone --depth 1 https://github.com/shannon-agent/shannon-code.git ../shannon-code
          cd ../shannon-code
          git fetch --depth 1 origin $SHANNON_CODE_REV
          git checkout $SHANNON_CODE_REV

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev libssl-dev

      - name: Configure China mirrors
        shell: bash
        run: |
          echo "RUSTUP_DIST_SERVER=https://rsproxy.cn" >> $GITHUB_ENV
          echo "RUSTUP_UPDATE_ROOT=https://rsproxy.cn/rustup" >> $GITHUB_ENV
          mkdir -p "$HOME/.cargo"
          cat > "$HOME/.cargo/config.toml" <<'EOF'
          [source.crates-io]
          replace-with = "rsproxy-sparse"

          [source.rsproxy-sparse]
          registry = "sparse+https://rsproxy.cn/index/"

          [registries.rsproxy]
          index = "https://rsproxy.cn/crates.io-index"

          [net]
          git-fetch-with-cli = true
          EOF
          npm config set registry https://registry.npmmirror.com

      - name: Install Rust
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Setup Node 20
        uses: https://gitea.com/actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm 10 via corepack
        run: corepack prepare pnpm@10 --activate

      - name: Install UI deps
        run: pnpm install --dir ui --frozen-lockfile

      - name: pnpm audit (high+ only)
        # Fail only on high/critical advisories. Use package.json
        # "pnpm.auditConfig" or .npmrc to explicitly allowlist exceptions
        # rather than silencing failures here.
        run: pnpm --dir ui audit --audit-level=high

      - name: cargo audit
        # Scans Cargo.lock against RustSec advisory DB.
        # --deny warnings treats any advisory as build failure.
        run: cargo audit --deny warnings

  build:
    needs: audit
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux
            bundles: deb,rpm,appimage
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
            bundles: msi,nsis
          # Single macOS job builds both arm64 + x86_64 sequentially,
          # so one runner produces both DMGs.
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos
            bundles: dmg

    steps:
      - name: Guard — only main or release tags
        shell: bash
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]] && [[ "$GITHUB_REF" != refs/tags/v* ]]; then
            echo "Release builds only run on main or v* tags. Got: $GITHUB_REF"
            exit 1
          fi

      - name: Checkout desktop
        uses: https://gitea.com/actions/checkout@v4

      - name: Route github.com through gh-proxy (defensive — catches any HTTPS fetch)
        shell: bash
        run: git config --global url."https://gh-proxy.com/https://github.com/".insteadOf "https://github.com/"

      - name: Clone shannon-code sibling at pinned rev
        shell: bash
        run: |
          git clone --depth 1 https://github.com/shannon-agent/shannon-code.git ../shannon-code
          cd ../shannon-code
          git fetch --depth 1 origin $SHANNON_CODE_REV
          git checkout $SHANNON_CODE_REV

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev libssl-dev

      - name: Configure China mirrors (Linux + macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          # rsproxy.cn mirrors both rustup artifacts AND crates.io.
          # tuna/bfsu/USTC prune rust-1.88.0 (rust-toolchain.toml pins to 1.88),
          # causing 404 on rustup-init. Verified rsproxy has the full archive.
          # These env vars are read by the rustup-init script in the next step.
          echo "RUSTUP_DIST_SERVER=https://rsproxy.cn" >> $GITHUB_ENV
          echo "RUSTUP_UPDATE_ROOT=https://rsproxy.cn/rustup" >> $GITHUB_ENV

          # crates.io registry mirror (same provider, sparse protocol).
          # sparse+ is mandatory for the index URL — rsproxy's sparse index is
          # ~10x faster than the git index for first-time fetches.
          mkdir -p "$HOME/.cargo"
          cat > "$HOME/.cargo/config.toml" <<'EOF'
          [source.crates-io]
          replace-with = "rsproxy-sparse"

          [source.rsproxy-sparse]
          registry = "sparse+https://rsproxy.cn/index/"

          [registries.rsproxy]
          index = "https://rsproxy.cn/crates.io-index"

          [net]
          git-fetch-with-cli = true
          EOF

          # pnpm/npm — use npmmirror.com (Alibaba) for UI deps install.
          npm config set registry https://registry.npmmirror.com

      - name: Install Rust (stable + targets)
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            rustup toolchain install stable --profile minimal
            rustup target add ${{ matrix.target }}
          else
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
            source "$HOME/.cargo/env"
            if [ "${{ runner.os }}" = "macOS" ]; then
              rustup target add aarch64-apple-darwin x86_64-apple-darwin
            else
              rustup target add ${{ matrix.target }}
            fi
          fi
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Setup Node 20
        uses: https://gitea.com/actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm 10 via corepack
        run: corepack prepare pnpm@10 --activate

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Install UI deps
        run: pnpm install --dir ui --frozen-lockfile

      - name: Build desktop installers
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            for t in aarch64-apple-darwin x86_64-apple-darwin; do
              echo "=== Building $t ==="
              cargo tauri build --target $t --bundles ${{ matrix.bundles }}
            done
          else
            cargo tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
          fi

      - name: Upload installers (linux)
        if: matrix.label == 'linux'
        uses: https://gitea.com/actions/upload-artifact@v3
        with:
          name: shannon-desktop-linux
          path: |
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/deb/*.deb.sig
            target/${{ matrix.target }}/release/bundle/rpm/*.rpm
            target/${{ matrix.target }}/release/bundle/rpm/*.rpm.sig
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.sig
            target/${{ matrix.target }}/release/bundle/**/latest.json

      - name: Upload installers (windows)
        if: matrix.label == 'windows'
        uses: https://gitea.com/actions/upload-artifact@v3
        with:
          name: shannon-desktop-windows
          path: |
            target/${{ matrix.target }}/release/bundle/msi/*.msi
            target/${{ matrix.target }}/release/bundle/msi/*.msi.sig
            target/${{ matrix.target }}/release/bundle/nsis/*.exe
            target/${{ matrix.target }}/release/bundle/nsis/*.exe.sig
            target/${{ matrix.target }}/release/bundle/**/latest.json

      - name: Upload installers (macos)
        if: matrix.label == 'macos'
        uses: https://gitea.com/actions/upload-artifact@v3
        with:
          name: shannon-desktop-macos
          path: |
            target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            target/aarch64-apple-darwin/release/bundle/dmg/*.dmg.sig
            target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            target/x86_64-apple-darwin/release/bundle/dmg/*.dmg.sig
            target/*/release/bundle/**/latest.json
