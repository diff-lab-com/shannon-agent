# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
yanked = "warn"
# Ignore unmaintained/unsound advisories that are widespread in the ecosystem.
# These are informational; fixing requires major dependency upgrades.
ignore = [
    "RUSTSEC-2021-0145", # atty - unsound, pervasive in Rust CLIs
    "RUSTSEC-2024-0375", # proc-macro-error - unmaintained
    "RUSTSEC-2025-0141", # paste - unmaintained
    "RUSTSEC-2024-0384", # glob - unmaintained
    "RUSTSEC-2024-0436", # paste - unmaintained (duplicate)
    "RUSTSEC-2017-0008", # flatten-tool - unmaintained
    "RUSTSEC-2024-0320", # unsound
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "Unicode-3.0",        # ICU/Unicode data crates
    "CDLA-Permissive-2.0", # IBM data licenses
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
