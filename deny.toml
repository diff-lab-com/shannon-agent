# cargo-deny config for the shannon-agent monorepo.
# ACTIVATED IN PHASE 5 (see ../MIGRATION.md): copy to repo root.
# `cargo deny check` runs licenses / advisories / bans / sources checks.

[graph]
all-features = true

[advisories]
# Treat unmaintained/yanked crates as warnings in CI (matches upstream
# shannon-agent policy). Crates can be pinned to a specific yanked version in
# Cargo.lock to escape the warning, but blocking CI on a single yanked release
# transitively pulled in by the ecosystem has no upside for monorepo velocity.
yanked = "warn"
ignore = [
    # Informational advisories — same baseline as upstream.
    # Ecosystem-wide, no fix available without breaking the dependency chain.
    "RUSTSEC-2021-0145", # atty - unsound, pervasive in Rust CLIs
    "RUSTSEC-2024-0375", # proc-macro-error - unmaintained
    "RUSTSEC-2025-0141", # paste - unmaintained
    "RUSTSEC-2024-0384", # glob - unmaintained
    "RUSTSEC-2024-0436", # paste - unmaintained (duplicate)
    "RUSTSEC-2017-0008", # flatten-tool - unmaintained
    "RUSTSEC-2024-0320", # yaml-rust - unsound (transitive via syntect)
    # quick-xml 0.39.4 (via plist 1.9.0 → syntect 5.3.0 → shannon-ui). Two DoS
    # advisories: 0194 = quadratic duplicate-attribute check (CPU exhaustion),
    # 0195 = NsReader unbounded namespace-decl allocation (memory exhaustion).
    # Neither is exploitable here: shannon-ui consumes syntect ONLY through
    # ThemeSet::load_defaults() / SyntaxSet::load_defaults_newlines() —
    # compile-time-embedded assets. No user-supplied or remote .tmTheme/.plist
    # is ever parsed, so no attacker-controlled XML reaches quick-xml.
    # Upgrade is blocked upstream: plist 1.9.0 is the latest release and pins
    # quick-xml = "^0.39"; no plist version uses quick-xml >=0.41. Re-evaluate
    # when plist/syntect ship a quick-xml >=0.41 build.
    "RUSTSEC-2026-0194", # quick-xml quad attribute check — non-exploitable (bundled assets only)
    "RUSTSEC-2026-0195", # quick-xml NsReader DoS — non-exploitable (bundled assets only)
    # gtk-rs GTK3 bindings - no longer maintained (multiple per-crate advisories).
    # Pulled in by Tauri / wry; no GTK3 usage in shannon-agent. Fix requires
    # upstream Tauri to drop gtk-sys, which is out of our control.
    "RUSTSEC-2024-0411", "RUSTSEC-2024-0412", "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0414", "RUSTSEC-2024-0415", "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0417", "RUSTSEC-2024-0418", "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",
    # `instant` is unmaintained — transitive via `tokio` test deps.
    "RUSTSEC-2024-0370",
    # `serial` is unmaintained — transitive via test fixtures.
    "RUSTSEC-2025-0075",
    # `unic-*` is unmaintained — transitive via `urlpattern` → `tauri-utils`.
    # Same family as yaml-rust; unicode crate project archived, no replacement
    # in `tauri` stack. Evaluate when Tauri 3 lands.
    "RUSTSEC-2025-0080", "RUSTSEC-2025-0081",
    "RUSTSEC-2025-0098", "RUSTSEC-2025-0100",
]

[licenses]
# cargo-deny 0.19 removed the `deny` key (https://github.com/EmbarkStudios/cargo-deny/pull/611).
# Any license not in `allow` is denied by default. The 0.18 schema used a
# permissive default + explicit `deny` list (GPL/AGPL/EUPL/CC-BY-SA); under 0.19
# the same policy requires listing every license we accept, including the
# weak-copyleft / permissive ones that 0.18 implicitly allowed (Tauri's
# transitive `dom_query` → `cssparser` (MPL-2.0), `libfuzzer-sys` (NCSA),
# `webpki-roots` (CDLA-Permissive-2.0)). The hard copyleft gates
# (GPL-2.0/3.0, AGPL-3.0, EUPL-1.2, CC-BY-SA-4.0) remain implicitly denied
# because they are not listed here.
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "0BSD",
    "Unlicense",
    # Weak copyleft / permissive additions — accepted by the 0.18 deny.toml
    # implicitly; required under 0.19 to keep Tauri / `libfuzzer-sys` /
    # `webpki-roots` in the build graph.
    "MPL-2.0",
    "NCSA",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93

[licenses.private]
ignore = true

[bans]
# Lint duplicated crate versions (intentional duplicates must be whitelisted here).
multiple-versions = "warn"
# Wildcards in workspace path-only deps are intentional and unambiguous (the
# shannon-* crates never publish to crates.io from this tree), so we keep them
# as warnings rather than CI blockers. This matches the upstream policy;
wildcards = "warn"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
