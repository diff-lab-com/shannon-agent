# cargo-deny config for the shannon-agent monorepo.
# ACTIVATED IN PHASE 5 (see ../MIGRATION.md): copy to repo root.
# `cargo deny check` runs licenses / advisories / bans / sources checks.

[graph]
all-features = true

[advisories]
# Treat unmaintained/yanked crates as failures in CI.
yanked = "deny"
ignore = [
    # Add advisory IDs to ignore here, with a reason, e.g.:
    # "RUSTSEC-2026-0000", # reason: no fixed version yet; tracked in #issue
]

[licenses]
# Allow permissive licenses compatible with Apache-2.0.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "0BSD",
    "Unlicense",
]
confidence-threshold = 0.93
# Flag copyleft / restrictive licenses.
deny = ["GPL-2.0", "GPL-3.0", "AGPL-3.0", "EUPL-1.2", "CC-BY-SA-4.0"]

[licenses.private]
ignore = true

[bans]
# Lint duplicated crate versions (intentional duplicates must be whitelisted here).
multiple-versions = "warn"
wildcards = "deny"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
