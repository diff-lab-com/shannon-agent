_en: "&English"
# English (default) locale for Shannon Code

# ── REPL Messages ──────────────────────────────────────────────────────────
repl:
  chat_cleared: "Chat cleared."
  unknown_command: "Unknown command: /%{name}. Type /help for available commands."
  session_saved: "Session saved."
  project_initialized: "Project initialized.\n%{info}"
  welcome: "Welcome to Shannon!"
  welcome_help: "Type your message and press **Enter**. Type `/help` for commands."
  no_input: "No input provided on stdin."
  input_error: "Input error: %{error}"
  query_failed: "Query failed: %{error}"
  stream_error: "Stream error: %{error}"
  cancelled: "Cancelled"
