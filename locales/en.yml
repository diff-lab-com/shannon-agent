    usage_set: "Usage: /config set <key> <value>"
    usage_reset: "Usage: /config reset <key>"
  hooks:
    none: "No hooks configured."
    reloaded: "Hooks reloaded successfully."
    reload_failed: "Failed to reload hooks: %{error}"
  memory:
    usage_remember: "Usage: /remember <text to remember>"
    store_not_available: "Memory store not available."
    store_not_configured: "Memory store not configured."
