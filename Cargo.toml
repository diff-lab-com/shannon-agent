[workspace]
resolver = "2"
members = [
    "crates/shannon-core",
    "crates/shannon-cli",
    "crates/shannon-ui",
    "crates/shannon-mcp",
    "crates/shannon-tools",
    "crates/shannon-agents",
    "crates/shannon-agent",
    "crates/shannon-types",
    "crates/shannon-commands",
    "crates/shannon-skills",
    "crates/shannon-tool-interface",
    "crates/shannon-codegen",
    "crates/shannon-desktop",
]

[workspace.package]
version = "0.2.1"
edition = "2024"
rust-version = "1.88"
authors = ["Shannon Code Contributors"]
license = "Apache-2.0"
repository = "https://github.com/shannon-agent/shannon-code"
homepage = "https://github.com/shannon-agent/shannon-code"

[workspace.dependencies]
# Async runtime
tokio = { version = "1.43", features = ["full"] }
tokio-util = "0.7"
tokio-stream = "0.1"
async-trait = "0.1"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"

# CLI
clap = { version = "4.5", features = ["derive"] }

# Terminal UI
ratatui = "0.29"
crossterm = "0.28"

# Error handling
anyhow = "1.0"
thiserror = "2.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# HTTP
reqwest = { version = "0.12", features = ["json", "stream", "rustls-tls"], default-features = false }
axum = { version = "0.7", features = ["ws"] }
tower-http = { version = "0.6", features = ["cors"] }

# Utilities
uuid = { version = "1.12", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
futures = "0.3"
futures-util = "0.3"
dirs = "5.0"
dotenvy = "0.15"
bytes = "1.0"

# Internationalization
rust-i18n = "3"
sys-locale = "0.3"

# WebSocket support
tokio-tungstenite = { version = "0.26", features = ["connect"] }

# OAuth2 PKCE support
sha2 = "0.10"
hmac = "0.12"
rand = "0.8"
base64 = "0.22"
urlencoding = "2.1"

# Image processing
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "webp", "gif"] }

# Property-based testing
proptest = "1"

[workspace.metadata.dist]
# Allow custom modifications to the release workflow (R2 upload steps)
allow-dirty = ["./.github/workflows/release.yml"]

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
panic = "abort"

[profile.dev]
opt-level = 0
debug = true

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"
