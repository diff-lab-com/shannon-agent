[workspace]
resolver = "2"
members = [
    "crates/shannon-core",
    "crates/shannon-core-base",
    "crates/shannon-core-api",
    "crates/shannon-core-tools",
    "crates/shannon-core-query",
    "crates/shannon-core-memory",
    "crates/shannon-core-plugins",
    "crates/shannon-core-features",
    "crates/shannon-core-maintenance",
    "crates/shannon-core-diagnostics",
    "crates/shannon-cli",
    "crates/shannon-ui",
    "crates/shannon-mcp",
    "crates/shannon-tools",
    "crates/shannon-agents",
    "crates/shannon-types",
    "crates/shannon-commands",
    "crates/shannon-skills",
    "crates/shannon-tool-interface",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
authors = ["Shannon Code Contributors"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/your-org/shannon-code"
homepage = "https://github.com/your-org/shannon-code"

[workspace.dependencies]
# Async runtime
tokio = { version = "1.43", features = ["full"] }
tokio-util = "0.7"
async-trait = "0.1"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# CLI
clap = { version = "4.5", features = ["derive"] }

# Terminal UI
ratatui = "0.29"
crossterm = "0.28"

# Error handling
anyhow = "1.0"
thiserror = "2.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# HTTP
reqwest = { version = "0.12", features = ["json", "stream"] }

# Utilities
uuid = { version = "1.12", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
futures-util = "0.3"
dirs = "5.0"
dotenvy = "0.15"
bytes = "1.0"

# WebSocket support
tokio-tungstenite = { version = "0.26", features = ["connect"] }

# OAuth2 PKCE support
sha2 = "0.10"
rand = "0.8"
base64 = "0.22"
urlencoding = "2.1"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
panic = "abort"

[profile.dev]
opt-level = 0
debug = true
