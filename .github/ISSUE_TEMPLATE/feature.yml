name: Feature request
description: Suggest a new feature
labels: ["enhancement"]
body:
  - type: dropdown
    id: product
    attributes:
      label: Which product?
      options:
        - shannon-cli
        - shannon-desktop
        - shannon-gateway
        - shared engine / wire protocol
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
