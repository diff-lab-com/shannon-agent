name: Bug report
description: Report something that doesn't work
labels: ["bug"]
body:
  - type: dropdown
    id: product
    attributes:
      label: Which product?
      options:
        - shannon-cli
        - shannon-desktop
        - shannon-gateway
        - shared engine / wire protocol
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v0.6.0 or commit SHA
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs (if any)
