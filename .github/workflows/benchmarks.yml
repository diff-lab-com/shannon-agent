name: Benchmarks
on:
  schedule:
    - cron: '0 3 * * 0'  # Weekly Sunday 3am UTC
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2

      - name: Run benchmarks
        run: cargo bench --workspace 2>&1 | tee benchmark-results.txt

      - name: PR baseline comparison
        if: github.event_name == 'pull_request'
        run: |
          BASE_SHA=$(git merge-base origin/main HEAD)
          echo "Comparing against base commit: $BASE_SHA"
          git stash || true
          git checkout $BASE_SHA
          cargo bench --workspace 2>&1 | tee /tmp/bench-base.txt || true
          git checkout -
          git stash pop || true
          echo ""
          echo "=== Baseline (main @ $BASE_SHA) ==="
          tail -15 /tmp/bench-base.txt || true
          echo ""
          echo "=== PR ($(git rev-parse --short HEAD)) ==="
          tail -15 benchmark-results.txt || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark-results.txt
            /tmp/bench-base.txt
          retention-days: 30
