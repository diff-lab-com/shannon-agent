name: PR Smoke Test

on:
  pull_request:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke-test:
    name: Live API Smoke Test
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release -p shannon-cli
      - name: Smoke test — DeepSeek
        run: |
          ./target/release/shannon \
            --prompt "Say exactly: smoke test passed" \
            --provider deepseek \
            --output-format json \
            2>&1 | tee /tmp/smoke-deepseek.json
          exit_code=$(python3 -c "import json,sys; d=json.load(open('/tmp/smoke-deepseek.json')); sys.exit(0 if d.get('exit_code')=='success' else 1)")
          echo "DeepSeek exit_code check: $?"
        env:
          SHANNON_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

  smoke-test-ollama:
    name: Live API Smoke Test (Ollama)
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release -p shannon-cli
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
      - name: Start Ollama and pull model
        run: |
          ollama serve &
          sleep 5
          ollama pull qwen2.5:0.5b
      - name: Smoke test — Ollama
        run: |
          ./target/release/shannon \
            --prompt "Say exactly: smoke test passed" \
            --provider ollama \
            --model qwen2.5:0.5b \
            --output-format json \
            2>&1 | tee /tmp/smoke-ollama.json
          exit_code=$(python3 -c "import json,sys; d=json.load(open('/tmp/smoke-ollama.json')); sys.exit(0 if d.get('exit_code')=='success' else 1)")
          echo "Ollama exit_code check: $?"
