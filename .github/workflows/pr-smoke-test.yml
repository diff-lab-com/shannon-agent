name: Provider Smoke Test

on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  mock-smoke-test:
    name: Mock Provider Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@v2
      - name: Run mock-based provider smoke tests
        run: |
          cargo test --test cli_e2e_tests -- \
            test_ollama_text_response_headless \
            test_anthropic_text_response_headless \
            test_deepseek_text_response_headless \
            --test-threads=1
