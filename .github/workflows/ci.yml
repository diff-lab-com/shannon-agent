name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Cancel in-progress runs for the same ref when a new commit is pushed.
# Keeps CI queue short on active branches (e.g. dev) without affecting main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@v2
      - name: Install Tauri system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev libxdo-dev patchelf
      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Build
        run: cargo build --workspace
      - name: Build with computer-use feature
        run: cargo build -p shannon-tools --features computer-use
      - name: Compile tests
        run: cargo test --workspace --no-run
      - name: Test
        run: cargo nextest run --workspace --config-file .config/nextest.toml

  vscode:
    name: VS Code Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install dependencies
        run: cd editors/vscode && npm install
      - name: Compile
        run: cd editors/vscode && npm run compile
      - name: Test
        run: cd editors/vscode && npm test

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Tauri system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev libxdo-dev patchelf
      - name: Clippy
        run: >
          cargo clippy --workspace --
          -D warnings
          -A unknown-lints
          -A clippy::collapsible_if
          -A clippy::collapsible_match
          -A clippy::derivable_impls
          -A clippy::manual_is_multiple_of
          -A clippy::manual_checked_div
          -A clippy::unwrap_used
          -A clippy::unnecessary_sort_by

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          components: rustfmt
      - name: Format check
        run: cargo fmt --all -- --check

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: Check dependencies
        run: cargo deny check --hide-inclusion-graph

  check-cross-platform:
    name: Cross-platform Check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
      - name: Install targets
        run: rustup target add x86_64-unknown-linux-musl
      - name: Install musl cross-compiler
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: Swatinem/rust-cache@v2
      - name: Install Tauri system deps (musl)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev libxdo-dev patchelf
      - name: Check Linux x86_64 musl
        run: cargo check --workspace --target x86_64-unknown-linux-musl

  semver-check:
    name: Semver Check
    runs-on: ubuntu-latest
    # Pre-1.0: semver is advisory, not gating.
    #  - continue-on-error: breaking changes are routine before 1.0 and must not
    #    turn the CI run red; the job still reports its result for visibility.
    #  - this job is intentionally NOT a branch-protection required check, so
    #    merges never wait on it.
    #  - baseline-rev (a git tag) replaces the default crates.io lookup because
    #    the `shannon-cli` crate name is squatted on crates.io.
    #  - `shannon-api-protocol` is excluded because it was introduced after
    #    the v0.5.5 baseline tag and so cannot be checked against that
    #    baseline; bumping the baseline tag will re-include it.
    continue-on-error: true
    env:
      # Bump this when cutting a new baseline release. It feeds both
      # `baseline-rev` and the cache `prefix-key`, so a baseline bump always
      # invalidates the cached baseline rustdoc and never serves a stale one.
      SEMVER_BASELINE: v0.5.5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check semver (baseline rustdoc cached)
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          baseline-rev: ${{ env.SEMVER_BASELINE }}
          prefix-key: baseline-${{ env.SEMVER_BASELINE }}
          # No rust-toolchain pin: the action defaults to latest stable, which
          # cargo-semver-checks (>=0.48) requires (rustc >=1.91 for its rustdoc
          # format). The repo-wide 1.88 pin is intentionally not used here.
          feature-group: default-features
          exclude: shannon-engine,shannon-stability-attr,shannon-api-protocol
          verbose: true
