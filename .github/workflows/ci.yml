name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@v2
      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Build
        run: cargo build --workspace
      - name: Build with computer-use feature
        run: cargo build -p shannon-tools --features computer-use
      - name: Compile tests
        run: cargo test --workspace --no-run
      - name: Test
        run: cargo nextest run --workspace --config-file .config/nextest.toml

  vscode:
    name: VS Code Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: cd editors/vscode && npm install
      - name: Compile
        run: cd editors/vscode && npm run compile
      - name: Test
        run: cd editors/vscode && npm test

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: >
          cargo clippy --workspace --
          -D warnings
          -A unknown-lints
          -A clippy::collapsible_if
          -A clippy::collapsible_match
          -A clippy::derivable_impls
          -A clippy::manual_is_multiple_of
          -A clippy::manual_checked_div
          -A clippy::unwrap_used
          -A clippy::unnecessary_sort_by

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          components: rustfmt
      - name: Format check
        run: cargo fmt --all -- --check

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: Check dependencies
        run: cargo deny check --hide-inclusion-graph

  check-cross-platform:
    name: Cross-platform Check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
      - name: Install targets
        run: rustup target add x86_64-unknown-linux-musl
      - name: Install musl cross-compiler
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: Swatinem/rust-cache@v2
      - name: Check Linux x86_64 musl
        run: cargo check --workspace --target x86_64-unknown-linux-musl
