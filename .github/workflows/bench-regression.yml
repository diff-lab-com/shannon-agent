name: Benchmark Regression

on:
  pull_request:
    branches: [main, dev]
    paths:
      # Hot paths that could cause performance regressions
      - 'crates/shannon-core/src/query_engine/**'
      - 'crates/shannon-core/src/tools.rs'
      - 'crates/shannon-core/src/tool_*.rs'
      - 'crates/shannon-core/src/tool_*/**'
      - 'crates/shannon-core/src/compact/**'
      - 'crates/shannon-core/src/context_budget.rs'
      - 'crates/shannon-core/src/context_pressure.rs'
      - 'crates/shannon-core/src/streaming_tool_executor.rs'
      - 'crates/shannon-core/src/session_persist.rs'
      - 'crates/shannon-core/src/token_estimation.rs'
      # Bench harness itself
      - 'benches/**'
      # Dependency changes
      - 'Cargo.toml'
      - 'Cargo.lock'
      # This workflow
      - '.github/workflows/bench-regression.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bench-regression:
    name: Performance Regression Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Non-blocking: informational only. Nightly benchmarks.yml runs full
    # suite and saves authoritative baseline.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@v2

      # ci.yml already runs all tests (perf_tests, scenario_tests) via nextest
      # This workflow only adds criterion benchmarks

      # Run criterion benchmarks and save baseline
      - name: Run Benchmarks
        run: |
          cargo bench --bench query_engine -- --save-baseline pr
          cargo bench --bench core_benchmarks -- --save-baseline pr
          cargo bench --bench recording_benchmarks -- --save-baseline pr
          cargo bench --bench compact_bench -- --save-baseline pr
          cargo bench --bench context_budget_bench -- --save-baseline pr
        continue-on-error: true

      # Summary
      - name: Benchmark Summary
        if: always()
        run: |
          echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Non-blocking informational check. Nightly benchmarks.yml saves the authoritative baseline." >> $GITHUB_STEP_SUMMARY
