# Single release orchestrator for the shannon-agent monorepo.
#
# Produces EXACTLY ONE GitHub Release per `v*` tag containing all three
# products:
#   - shannon (Rust CLI)         — built with plain `cargo build` per target,
#                                  archived + sha256'd, uploaded via
#                                  `gh release upload --clobber`
#   - shannon-desktop (Tauri)    — built by tauri-action (releaseDraft:true;
#                                  reuses the pre-created draft, no create)
#   - shannon-gateway (Bun)      — built by `bun build --compile`, uploaded
#                                  via softprops into the same draft
#
# Why no cargo-dist `host`/`announce`: its release-ownership model wants to
# CREATE+PUBLISH the GitHub release itself, which fights our "one draft,
# collect every asset, then flip to published" model. With `release = false`
# in dist-workspace.toml, `dist host --steps=upload` actually skips the
# GitHub upload entirely (it printed only the "may not exist yet" NOTE and
# uploaded nothing — that's why rc2's releases had zero CLI binaries). We
# still let cargo-dist *build* the CLI nowhere; cargo-dist is now unused for
# the release path. Building with `cargo build -p shannon-cli` directly is
# fully under our control and the shannon-cli closure contains no
# desktop/tauri/gtk deps, so the CLI job needs no system GUI libraries.
#
# Release-ordering contract:
#   - `create-release` is the ONLY job that creates the release. It runs
#     right after `prep` and idempotently guarantees EXACTLY ONE draft for
#     the tag (collapsing any duplicate releases left by a prior failed run).
#     This serializes creation and removes the concurrent create race that
#     produced rc2's two releases.
#   - `desktop`, `cli`, and `gateway` all `needs: [create-release]`, so the
#     draft exists before any of them append assets. They are upload-only.
#   - `publish` is the ONLY job that flips draft -> published; it
#     `needs: [cli, desktop, gateway]` with `if: success()`.
#
# Asset naming MUST match scripts/install.sh|install.ps1:
#   - CLI:   shannon-<target>.tar.gz  (.zip on Windows)  +  <archive>.sha256
#            each containing a binary named `shannon` / `shannon.exe`.
#   - Desktop: produced by tauri-action (shannon-desktop_<ver>_<arch>.{deb,dmg,exe} ...).
#   - Gateway: shannon-gateway-<os>-<arch> (see gateway matrix `artifact`).
#
# Triggered on `v*` tags + manual dispatch.

name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ───────────────────────────── Version guard ─────────────────────────────
  # Fail early if the workspace Cargo version doesn't match the pushed tag.
  prep:
    name: version guard
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.guard.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify version matches tag
        id: guard
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag:      $TAG"
          echo "Expected: $VERSION"
          # Extract workspace.package.version from the root Cargo.toml.
          CARGO_VERSION="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "Cargo:    $CARGO_VERSION"
          if [ "$CARGO_VERSION" != "$VERSION" ]; then
            echo "::error::workspace.package.version ($CARGO_VERSION) does not match tag ($VERSION)"
            exit 1
          fi
          echo "Version guard passed: $VERSION"

  # ──────────────────────────── Create draft release ───────────────────────
  # The SINGLE owner of the release. Idempotently guarantees exactly one
  # draft for the tag: if duplicate releases exist (leftover from a failed
  # prior run / a create race), keep the one with the most assets and delete
  # the rest, then create the draft if it doesn't exist yet. Every downstream
  # job depends on this so creation is fully serialized — no concurrent
  # getOrCreateRelease races.
  create-release:
    name: create draft release
    needs: [prep]
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Ensure exactly one draft release for ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"
          # (asset_count release_id) for every release on this tag.
          mapfile -t ENTRIES < <(gh api "repos/$REPO/releases" --paginate \
            --jq ".[] | select(.tag_name==\"$TAG\") | \"\(.assets|length) \(.id)\"")
          if [ "${#ENTRIES[@]}" -gt 1 ]; then
            echo "found ${#ENTRIES[@]} releases for $TAG — collapsing to one (keep most assets)"
            printf '%s\n' "${ENTRIES[@]}" | sort -rn > /tmp/rels
            keep="$(awk 'NR==1{print $2}' /tmp/rels)"
            while read -r n id; do
              [ "$id" = "$keep" ] && continue
              echo "  deleting duplicate release $id ($n assets)"
              gh api -X DELETE "repos/$REPO/releases/$id"
            done < /tmp/rels
          fi
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "release $TAG already exists — reusing"
          else
            if [[ "$TAG" == *-* ]]; then PRE="--prerelease"; else PRE=""; fi
            gh release create "$TAG" --repo "$REPO" --draft $PRE \
              --title "$TAG" \
              --notes "shannon-agent $TAG — automated release (draft until publish)."
            echo "created draft release $TAG"
          fi

  # ───────────────────────────── Rust CLI (cargo build) ────────────────────
  # Builds only `shannon-cli` (bin `shannon`). Its dependency closure contains
  # NO desktop/tauri/gtk crate, so no GUI system libraries are needed — the
  # CLI job skips the webkit/gtk apt install entirely. Archived + sha256'd and
  # uploaded into the pre-created draft with --clobber (idempotent on re-runs).
  cli:
    name: shannon cli (${{ matrix.target }})
    needs: [create-release]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: x86_64-apple-darwin
            os: macos-14
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}

      - name: Build CLI
        shell: bash
        run: cargo build --release -p shannon-cli --target ${{ matrix.target }}

      - name: Package + upload CLI (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          TARGET="${{ matrix.target }}"
          ART="shannon-${TARGET}.tar.gz"
          tar -C "target/${TARGET}/release" -czf "$ART" shannon
          # shasum is the portable choice: present on macOS (built-in) and
          # on Linux runners (ships with Perl). macOS has no sha256sum.
          shasum -a 256 "$ART" > "${ART}.sha256"
          gh release upload "$TAG" "$ART" "${ART}.sha256" --clobber --repo "$GITHUB_REPOSITORY"

      - name: Package + upload CLI (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $Tag = $env:GITHUB_REF_NAME
          $Target = "${{ matrix.target }}"
          $Art = "shannon-$Target.zip"
          Compress-Archive -Path "target/$Target/release/shannon.exe" -DestinationPath $Art
          $Hash = (Get-FileHash $Art -Algorithm SHA256).Hash.ToLower()
          "$Hash  $Art" | Out-File -Encoding ascii "$Art.sha256"
          gh release upload $Tag $Art "$Art.sha256" --clobber --repo $env:GITHUB_REPOSITORY

  # ───────────────────────────── Desktop (Tauri) ───────────────────────────
  # Reuses the draft created by `create-release` (tauri-action's
  # getOrCreateRelease finds it and uploads — no creation, no race). No
  # releaseName so the unified release keeps its tag-name title.
  desktop:
    name: shannon-desktop (${{ matrix.target }}-${{ matrix.ext }})
    needs: [create-release]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            ext: deb
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            ext: rpm
          - target: x86_64-apple-darwin
            os: macos-14
            ext: dmg
          - target: aarch64-apple-darwin
            os: macos-14
            ext: dmg
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: nsis
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: desktop-${{ matrix.target }}-${{ matrix.ext }}

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev libxdo-dev patchelf

      - name: Setup Node + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install UI deps
        working-directory: desktop/ui
        run: pnpm install --frozen-lockfile

      # productName is `shannon-desktop`, so bundles are shannon-desktop_*.
      # releaseDraft:true only creates if missing — the draft from
      # create-release already exists, so this just uploads into it.
      - name: Build & upload Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}  # rc/beta/alpha (dash) -> prerelease
          args: --target ${{ matrix.target }} --bundles ${{ matrix.ext }}

  # ───────────────────────────── Gateway (Bun) ─────────────────────────────
  # softprops find-or-creates; the draft already exists (create-release), so
  # it uploads into it. draft:true keeps it a draft until `publish`.
  gateway:
    name: shannon-gateway (${{ matrix.target }})
    needs: [create-release]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            os: ubuntu-22.04
            artifact: shannon-gateway-linux-x64
          - target: bun-linux-arm64
            os: ubuntu-22.04
            artifact: shannon-gateway-linux-arm64
          - target: bun-darwin-x64
            os: macos-14
            artifact: shannon-gateway-darwin-x64
          - target: bun-darwin-arm64
            os: macos-14
            artifact: shannon-gateway-darwin-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        working-directory: gateway
        run: bun install --frozen-lockfile

      - name: Typecheck
        working-directory: gateway
        run: bun run typecheck

      - name: Test
        working-directory: gateway
        run: bun run test

      - name: Build binary
        working-directory: gateway
        run: |
          set -euo pipefail
          bun build --compile \
            --target="$TARGET" \
            --outfile="dist/$ARTIFACT" \
            src/index.ts
          ls -la dist/
        env:
          TARGET: ${{ matrix.target }}
          ARTIFACT: ${{ matrix.artifact }}

      - name: Upload gateway binary to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: gateway/dist/${{ matrix.artifact }}
          fail_on_unmatched_files: false

  # ───────────────────────────── Publish release ───────────────────────────
  # The ONLY job that flips the release from draft -> published. Generates a
  # SHA256SUMS over all binary/installer assets (excluding the per-asset
  # .sha256 sidecars), attaches install.sh/install.ps1 + SHA256SUMS, then
  # mirrors everything to Cloudflare R2 (guarded by vars.R2_BUCKET). With
  # create-release guaranteeing a single release, the publish flip can no
  # longer hit the `already_exists` collision that aborted rc2.
  publish:
    name: publish release ${{ github.ref_name }}
    needs: [cli, desktop, gateway]
    if: success()
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all release assets
        shell: bash
        run: |
          mkdir -p release-assets
          gh release download "${{ github.ref_name }}" -D release-assets --repo "$GITHUB_REPOSITORY"
          ls -la release-assets

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          cd release-assets
          # Every binary/installer asset, but not the per-asset .sha256
          # sidecars (checksums-of-checksums add no value) nor this file.
          find . -type f ! -name '*.sha256' -print0 \
            | sort -z | xargs -0 sha256sum \
            | sed 's| \./| |' > SHA256SUMS
          cat SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # rc/beta/alpha (dash) -> prerelease
          files: |
            scripts/install.sh
            scripts/install.ps1
            release-assets/SHA256SUMS

      - name: Upload to Cloudflare R2
        if: vars.R2_BUCKET != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          npm install -g wrangler@4.98.0
          VERSION="${{ github.ref_name }}"
          BUCKET="${{ vars.R2_BUCKET }}"
          for f in release-assets/*; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            wrangler r2 object put "$BUCKET/$VERSION/$base" --file "$f"
            wrangler r2 object put "$BUCKET/latest/$base" --file "$f"
          done
          wrangler r2 object put "$BUCKET/$VERSION/install.sh" --file scripts/install.sh
          wrangler r2 object put "$BUCKET/$VERSION/install.ps1" --file scripts/install.ps1
          wrangler r2 object put "$BUCKET/latest/install.sh" --file scripts/install.sh
          wrangler r2 object put "$BUCKET/latest/install.ps1" --file scripts/install.ps1
