name: Release
on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: shannon-code-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: shannon-code-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: shannon-code-macos-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: shannon-code-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: shannon-code-windows-x64
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: shannon-code-windows-arm64

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release -p shannon-cli -p shannon-agent --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/shannon dist/
          cp target/${{ matrix.target }}/release/shannon-agent dist/
          cp LICENSE dist/ 2>/dev/null || true
          cp README.md dist/ 2>/dev/null || true
          cd dist && tar czf ${{ matrix.artifact }}.tar.gz *
          sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/${{ matrix.target }}/release/shannon.exe dist/
          Copy-Item target/${{ matrix.target }}/release/shannon-agent.exe dist/
          Copy-Item LICENSE dist/ -ErrorAction SilentlyContinue
          Copy-Item README.md dist/ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist/* -DestinationPath dist/${{ matrix.artifact }}.zip
          $hash = Get-FileHash dist/${{ matrix.artifact }}.zip -Algorithm SHA256
          $hash.Hash | Out-File -FilePath dist/${{ matrix.artifact }}.zip.sha256 -Encoding utf8

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
