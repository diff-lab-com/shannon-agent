# Single release orchestrator for the shannon-agent monorepo.
#
# Produces EXACTLY ONE GitHub Release per `v*` tag containing all three
# products:
#   - shannon (Rust CLI)         — built by cargo-dist (release=false, so it
#                                  only uploads into THIS tag's release)
#   - shannon-desktop (Tauri)    — built by tauri-action with releaseDraft:true
#   - shannon-gateway (Bun)      — built by `bun build --compile`
#
# This replaces the previous two-file setup (cargo-dist autogenerated
# `release.yml` + `release-desktop.yml`), which created two competing
# releases for the same tag and failed because crate versions didn't match
# the tag. `release-desktop.yml` is now superseded and deleted.
#
# Release-ordering contract (see report):
#   - `desktop` is the FIRST job to run and creates the draft release
#     (tauri-action, releaseDraft:true). Its matrix entries run in parallel
#     and share that one draft via getOrCreateRelease (idempotent).
#   - `cli` and `gateway` both `needs: [desktop]` so the draft exists before
#     they append their assets to the same tag's release.
#   - `publish` is the ONLY job that flips draft -> published, and it
#     `needs: [cli, desktop, gateway]` with `if: success()`.
#
# Triggered on `v*` tags (matches publish-crates.yml) + manual dispatch.

name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ───────────────────────────── Version guard ─────────────────────────────
  # Fail early if the workspace Cargo version doesn't match the pushed tag.
  prep:
    name: version guard
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.guard.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify version matches tag
        id: guard
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag:      $TAG"
          echo "Expected: $VERSION"
          # Extract workspace.package.version from the root Cargo.toml.
          CARGO_VERSION="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "Cargo:    $CARGO_VERSION"
          if [ "$CARGO_VERSION" != "$VERSION" ]; then
            echo "::error::workspace.package.version ($CARGO_VERSION) does not match tag ($VERSION)"
            exit 1
          fi
          echo "Version guard passed: $VERSION"

  # ───────────────────────────── Rust CLI (cargo-dist) ────────────────────
  # Builds `shannon` via cargo-dist across the dist-workspace.toml targets and
  # uploads the binaries into the EXISTING tag's release (release=false means
  # cargo-dist will NOT create its own release — it only does
  # `dist host --steps=upload`).
  cli:
    name: shannon (${{ matrix.target }})
    needs: [desktop]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: x86_64-apple-darwin
            os: macos-14
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev libxdo-dev patchelf

      - name: Install dist
        shell: bash
        run: "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.32.0/cargo-dist-installer.sh | sh"

      - name: Build CLI artifacts
        shell: bash
        run: dist build --tag="${{ github.ref_name }}" --output-format=json

      - name: Upload to release (no release creation)
        shell: bash
        run: dist host --steps=upload --tag="${{ github.ref_name }}"

  # ───────────────────────────── Desktop (Tauri) ──────────────────────────
  # Creates the draft release on its first matrix entry; parallel entries and
  # the cli/gateway jobs append to the same tag's release.
  desktop:
    name: shannon-desktop (${{ matrix.target }}-${{ matrix.ext }})
    needs: [prep]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            ext: deb
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            ext: rpm
          - target: x86_64-apple-darwin
            os: macos-14
            ext: dmg
          - target: aarch64-apple-darwin
            os: macos-14
            ext: dmg
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: nsis
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev libxdo-dev patchelf

      - name: Setup Node + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install UI deps
        working-directory: desktop/ui
        run: pnpm install --frozen-lockfile

      # productName was already renamed to `shannon-desktop`, so bundles are
      # shannon-desktop_*. releaseDraft:true keeps it a draft until `publish`.
      - name: Build & release Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'shannon-desktop ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.ext }}

  # ───────────────────────────── Gateway (Bun) ────────────────────────────
  gateway:
    name: shannon-gateway (${{ matrix.target }})
    needs: [desktop]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            os: ubuntu-22.04
            artifact: shannon-gateway-linux-x64
          - target: bun-linux-arm64
            os: ubuntu-22.04
            artifact: shannon-gateway-linux-arm64
          - target: bun-darwin-x64
            os: macos-14
            artifact: shannon-gateway-darwin-x64
          - target: bun-darwin-arm64
            os: macos-14
            artifact: shannon-gateway-darwin-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        working-directory: gateway
        run: bun install --frozen-lockfile

      - name: Typecheck
        working-directory: gateway
        run: bun run typecheck

      - name: Test
        working-directory: gateway
        run: bun run test

      - name: Build binary
        working-directory: gateway
        run: |
          set -euo pipefail
          bun build --compile \
            --target="$TARGET" \
            --outfile="dist/$ARTIFACT" \
            src/index.ts
          ls -la dist/
        env:
          TARGET: ${{ matrix.target }}
          ARTIFACT: ${{ matrix.artifact }}

      - name: Upload gateway binary to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: gateway/dist/${{ matrix.artifact }}
          fail_on_unmatched_files: false

  # ───────────────────────────── Publish release ──────────────────────────
  # The ONLY job that flips the release from draft -> published. Attaches the
  # install scripts + a SHA256SUMS file, then mirrors everything to Cloudflare
  # R2 (guarded by vars.R2_BUCKET).
  publish:
    name: publish release ${{ github.ref_name }}
    needs: [cli, desktop, gateway]
    if: success()
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all release assets
        id: assets
        shell: bash
        run: |
          mkdir -p release-assets
          gh release download "${{ github.ref_name }}" -D release-assets
          ls -la release-assets

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          cd release-assets
          # Include every binary/installer asset, but not this generated file.
          sha256sum -- * > SHA256SUMS.tmp
          mv SHA256SUMS.tmp SHA256SUMS
          cat SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            scripts/install.sh
            scripts/install.ps1
            release-assets/SHA256SUMS

      - name: Upload to Cloudflare R2
        if: vars.R2_BUCKET != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          npm install -g wrangler@4.98.0
          VERSION="${{ github.ref_name }}"
          BUCKET="${{ vars.R2_BUCKET }}"
          for f in release-assets/*; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            wrangler r2 object put "$BUCKET/$VERSION/$base" --file "$f"
            wrangler r2 object put "$BUCKET/latest/$base" --file "$f"
          done
          wrangler r2 object put "$BUCKET/$VERSION/install.sh" --file scripts/install.sh
          wrangler r2 object put "$BUCKET/$VERSION/install.ps1" --file scripts/install.ps1
          wrangler r2 object put "$BUCKET/latest/install.sh" --file scripts/install.sh
          wrangler r2 object put "$BUCKET/latest/install.ps1" --file scripts/install.ps1
