name: Regression Tests

on:
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  regression:
    name: Regression
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Run regression tests
        run: |
          chmod +x scripts/test-regression.sh
          ./scripts/test-regression.sh --skip-perf

      - name: Upload timing log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-timing
          path: /tmp/shannon-regression-timing.log
          retention-days: 7

  benchmark-regression:
    name: Benchmark Regression Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 45
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@v2

      - name: Restore baseline cache
        uses: actions/cache@v4
        with:
          path: target/criterion
          key: bench-baseline-${{ github.base_ref || 'main' }}
          restore-keys: |
            bench-baseline-main

      - name: Compare benchmarks against baseline
        run: |
          if [ -d "target/criterion" ] && [ "$(ls -A target/criterion 2>/dev/null)" ]; then
            bash scripts/bench-regression.sh compare
          else
            echo "No baseline found — saving initial baseline instead"
            bash scripts/bench-regression.sh save
          fi

      - name: Upload comparison results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-comparison
          path: benchmark-results.txt
          retention-days: 7
          if-no-files-found: ignore
