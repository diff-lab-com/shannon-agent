# Desktop (Tauri) and Gateway (Bun) releases — matrix builds for the monorepo.
# The Rust CLI release is handled by .github/workflows/release.yml (cargo-dist).
# This file covers the two remaining products that cargo-dist does not understand:
#   - shannon-desktop: Tauri v2 (Rust + React) → .deb / .rpm / .AppImage / .msi / .dmg
#   - shannon-gateway:  Bun-compiled TS binary  → linux/darwin x64+arm64
#
# Triggered on `v*` tags (matches the cargo-dist pattern).

name: release-desktop-gateway

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  # Allow manual re-runs of the release build (e.g. for aarch64 desktop
  # after a self-hosted runner is added). The release-desktop.yml workflow
  # does not tag on a non-tag push, so this trigger is local-only.
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ────────────────────────── Desktop (Tauri) ──────────────────────────
  desktop:
    name: shannon-desktop (${{ matrix.target }})
    needs: []
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 covers both .deb and .rpm from the same runner.
          # aarch64-unknown-linux-gnu is excluded: cross-compiling Tauri
          # (which depends on glib-sys / webkit2gtk-4.1) from an x86_64
          # runner requires an aarch64 sysroot that is not provided.
          # Add it back when GitHub-hosted aarch64 Linux runners are GA
          # (or when we add a self-hosted aarch64 builder).
          # `ext_subdir` is the bundle subdir Tauri writes for each format.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            ext: deb
            ext_subdir: deb
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            ext: rpm
            ext_subdir: rpm
          - target: x86_64-apple-darwin
            os: macos-14
            ext: dmg
            ext_subdir: dmg
          - target: aarch64-apple-darwin
            os: macos-14
            ext: dmg
            ext_subdir: dmg
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: msi
            ext_subdir: msi
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev libxdo-dev patchelf

      - name: Setup Node + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install UI deps
        working-directory: desktop/ui
        run: pnpm install --frozen-lockfile

      - name: Build & bundle Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          args: --target ${{ matrix.target }}

      - name: Verify desktop bundle exists
        # Sanity check: print whatever ended up in the bundle dir so a
        # missing-platform failure surfaces clearly in the job log instead
        # of only inside the upload-artifact step. Also exports each
        # file's path on its own line to $GITHUB_OUTPUT, which the next
        # step feeds to upload-artifact's `path` input. Listing concrete
        # paths (rather than a glob like `*` or `**`) is the only thing
        # that reliably picks up the space-containing filenames the
        # Tauri productName "Shannon Agent" produces
        # (e.g. "Shannon Agent_0.6.0_amd64.deb").
        #
        # Retry up to 30s for the bundle dir to appear — the Tauri
        # build step prints 'Built application' and lists all bundle
        # paths before every file has actually been flushed to disk,
        # and the next step (this one) runs immediately. Without the
        # retry, the verify step would sometimes see the dir missing
        # even though Tauri is about to write into it.
        id: collect
        shell: bash
        run: |
          set -euo pipefail
          bundle_dir="target/${{ matrix.target }}/release/bundle/${{ matrix.ext_subdir }}"
          for attempt in $(seq 1 30); do
            if [ -d "$bundle_dir" ] && [ -n "$(ls -A "$bundle_dir" 2>/dev/null || true)" ]; then
              break
            fi
            echo "waiting for $bundle_dir (attempt $attempt)..."
            sleep 1
          done
          if [ ! -d "$bundle_dir" ]; then
            echo "::error::bundle dir missing after 30s: $bundle_dir"
            ls -la "target/${{ matrix.target }}/release/bundle/" 2>/dev/null || true
            exit 1
          fi
          # Use null-delimited find so filenames with newlines or spaces
          # survive intact, then transform to a multiline string for
          # the upload-artifact `path` input.
          mapfile -d '' -t files < <(find "$bundle_dir" -mindepth 1 -maxdepth 1 -type f -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::no files in $bundle_dir after 30s"
            exit 1
          fi
          echo "uploading ${#files[@]} file(s) from $bundle_dir:"
          printf '  %s\n' "${files[@]}"
          # Multiline output for `path` input.
          {
            echo "files<<EOF"
            printf '%s\n' "${files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: shannon-desktop-${{ matrix.target }}-${{ matrix.ext }}
          # Path is the multiline list of concrete file paths collected
          # by the previous step. Glob patterns (`*`, `**`, bare dir)
          # all fail for the space-containing filenames that Tauri's
          # productName produces, so we feed exact paths instead.
          path: ${{ steps.collect.outputs.files }}
          if-no-files-found: error

  # ────────────────────────── Gateway (Bun) ──────────────────────────
  gateway:
    name: shannon-gateway (${{ matrix.target }})
    needs: []
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            os: ubuntu-22.04
            artifact: shannon-gateway-linux-x64
          - target: bun-linux-arm64
            os: ubuntu-22.04
            artifact: shannon-gateway-linux-arm64
          - target: bun-darwin-x64
            os: macos-14
            artifact: shannon-gateway-darwin-x64
          - target: bun-darwin-arm64
            os: macos-14
            artifact: shannon-gateway-darwin-arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        working-directory: gateway
        run: bun install --frozen-lockfile

      - name: Typecheck
        working-directory: gateway
        run: bun run typecheck

      # Use `bun run test` (vitest run, per package.json) rather than
      # `bun test` (bun's built-in runner). The latter ignores vitest.config.ts
      # and falls back to a 5-second per-test timeout that is too tight for
      # the gateway's socket- and WebSocket-based tests on CI hardware.
      - name: Test
        working-directory: gateway
        run: bun run test

      - name: Build binary
        working-directory: gateway
        run: bun run build:binary
        env:
          TARGET: ${{ matrix.target }}

      - name: Upload gateway binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: gateway/dist/${{ matrix.artifact }}

  # ────────────────────────── Attach to release ──────────────────────────
  attach:
    name: attach artifacts to release
    needs: [desktop, gateway]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          fail_on_unmatched_files: false