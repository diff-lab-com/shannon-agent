name: Release Tests

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-test:
    name: Full Release Test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Run full release test suite
        run: |
          chmod +x scripts/test-release.sh
          ./scripts/test-release.sh --skip-long

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: target/test-report.txt
          retention-days: 30

  release-build:
    name: Build Release Binary
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: |
          cargo build --release -p shannon-cli
          cp target/release/shannon shannon-linux-amd64

      - name: Verify binary
        run: |
          ./shannon-linux-amd64 --version || echo "Binary built but --version not implemented"

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: shannon-linux-amd64
          path: shannon-linux-amd64
          retention-days: 90

  release-cross-check:
    name: Cross-platform Build Check
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build for target
        run: cargo build --release -p shannon-cli --target ${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: shannon-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/shannon*
          retention-days: 90
