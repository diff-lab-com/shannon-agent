name: bash_command
description: "Execute a bash command and report the result"
prompt: "Run echo hello and show me the output"
provider: anthropic

setup:
  files: []

mock_responses:
  - response:
      type: tool_use
      tool: Bash
      tool_id: toolu_1
      input: { "command": "echo hello" }
  - response:
      type: text
      content: "The output is: hello"

validate:
  - rule: exit_code
    value: success
