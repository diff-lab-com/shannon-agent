name: error_recovery
description: "Handle tool error gracefully and retry"
prompt: "Read the file missing.txt"
provider: anthropic

setup:
  files: []

mock_responses:
  - response:
      type: tool_use
      tool: Read
      tool_id: toolu_1
      input: { "path": "missing.txt" }
  - response:
      type: text
      content: "The file missing.txt does not exist. No action needed."

validate:
  - rule: exit_code
    value: success
