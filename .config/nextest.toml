# nextest configuration for Shannon Code
# https://nexte.st/book/configuration.html

[profile.default]
# Limit concurrent test processes to avoid over-subscription.
# Each test creates a tokio multi-threaded runtime (num-cpus workers),
# so num-cpus processes × num-cpus threads = 400 threads on 20 CPUs.
# 8 processes × 20 threads = 160 threads on 20 CPUs = 8:1, manageable.
test-threads = 8

# Each test runs in its own process (nextest default), so env var
# contention between tests is already isolated. But some crates
# share filesystem state — keep those single-threaded below.

# Crates with env var / filesystem contention: run serially via test group.
[test-groups]
serial = { max-threads = 1 }

[[profile.default.overrides]]
filter = 'package(shannon-core)'
test-group = 'serial'

[[profile.default.overrides]]
filter = 'package(shannon-commands)'
test-group = 'serial'

# CI profile: stricter timeouts, retries for flaky tests, JUnit output.
[profile.ci]
test-threads = 4
failure-output = "immediate-final"
fail-fast = false
slow-timeout = { period = "60s", terminate-after = 3 }
retries = { count = 2, backoff = "exponential", delay = "5s", max-delay = "30s", jitter = true }

[[profile.ci.overrides]]
filter = 'package(shannon-core)'
test-group = 'serial'

[[profile.ci.overrides]]
filter = 'package(shannon-commands)'
test-group = 'serial'
