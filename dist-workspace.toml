[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell", "homebrew"]
# Target platforms to build apps for (Rust target-triple syntax).
# Note: the linux targets are gnu (not musl) because the workspace
# includes shannon-desktop (Tauri), whose glib-sys / webkit2gtk-4.1
# native deps are glibc-only. Cross-compiling to musl from a Linux
# runner requires a musl sysroot + cross pkg-config that are not
# provided on GitHub-hosted runners.
#
# aarch64-unknown-linux-gnu is excluded: it would require an aarch64
# sysroot + cross pkg-config to link glib-sys against aarch64 libs.
# Add it back when GitHub-hosted aarch64 Linux runners are GA or
# when we have a self-hosted aarch64 builder.
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
# Where to host releases
hosting = "github"
# Archive format
unix-archive = ".tar.gz"
windows-archive = ".zip"
merge-tasks = true
# Allow custom modifications to the generated CI workflow
allow-dirty = ["ci"]

[dist.homebrew]
tap = "shannon-agent/homebrew-shannon"
